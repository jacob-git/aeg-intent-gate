<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">aeg-intent-gate approval flow</title>
  <desc id="desc">An AI tool call enters an approval gate. A safe notification is approved, a refund waits for approval, and a dangerous shell command is blocked.</desc>
  <style>
    svg { background: #f6f8fb; color: #121826; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .panel { fill: #fff; stroke: #d9e0ea; stroke-width: 2; }
    .title { font-size: 30px; font-weight: 800; fill: #121826; }
    .label { font-size: 17px; font-weight: 700; fill: #121826; }
    .text { font-size: 15px; fill: #526070; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; fill: #e5e7eb; }
    .terminal { fill: #111827; }
    .approved { fill: #dcfce7; stroke: #86efac; }
    .approval { fill: #fef3c7; stroke: #facc15; }
    .blocked { fill: #fee2e2; stroke: #fca5a5; }
    .good { fill: #15803d; }
    .warn { fill: #a16207; }
    .bad { fill: #b91c1c; }
    .arrow { stroke: #0f766e; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
    .slide { animation: slide 2.8s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .72; transform: scale(.985); }
    }
    @keyframes slide {
      0%, 22% { opacity: .2; transform: translateX(-18px); }
      38%, 100% { opacity: 1; transform: translateX(0); }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e" />
    </marker>
  </defs>

  <text x="48" y="58" class="title">Gate AI tool calls before execution</text>
  <text x="48" y="86" class="text">Policy decides whether a proposed action becomes an executable command.</text>

  <rect x="48" y="126" width="270" height="330" rx="10" class="panel" />
  <text x="72" y="164" class="label">Model output</text>
  <rect x="72" y="190" width="222" height="218" rx="8" class="terminal" />
  <text x="92" y="226" class="code">tool_call: refund.create</text>
  <text x="92" y="258" class="code">target: stripe</text>
  <text x="92" y="290" class="code">amount: 250</text>
  <text x="92" y="322" class="code">status: proposed</text>
  <text x="72" y="434" class="text">Structured request, not a command.</text>

  <path d="M330 292 H438" class="arrow" />

  <rect x="454" y="126" width="250" height="330" rx="10" class="panel pulse" />
  <text x="482" y="164" class="label">Approval gate</text>
  <text x="482" y="196" class="text">Capabilities checked first.</text>
  <text x="482" y="224" class="text">Policies run in order.</text>
  <text x="482" y="252" class="text">Unknown actions fail closed.</text>
  <rect x="482" y="294" width="194" height="48" rx="24" class="approval" />
  <text x="518" y="324" class="warn label">requires approval</text>
  <text x="482" y="384" class="text">Human review can grant approval.</text>

  <path d="M716 292 H820" class="arrow" />

  <rect x="838" y="110" width="154" height="86" rx="10" class="approved slide" />
  <text x="870" y="144" class="good label">approved</text>
  <text x="866" y="171" class="text">email.send</text>

  <rect x="838" y="238" width="154" height="86" rx="10" class="approval slide" />
  <text x="855" y="272" class="warn label">human review</text>
  <text x="859" y="299" class="text">refund.create</text>

  <rect x="838" y="366" width="154" height="86" rx="10" class="blocked slide" />
  <text x="876" y="400" class="bad label">blocked</text>
  <text x="871" y="427" class="text">shell.exec</text>
</svg>
