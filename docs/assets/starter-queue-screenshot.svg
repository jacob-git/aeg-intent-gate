<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-label="aeg-intent-gate starter approval queue screenshot">
  <rect width="1600" height="1600" fill="#f4f8f7"/>
  <text x="64" y="78" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#101828">aeg-intent-gate starter</text>
  <text x="64" y="145" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="3" fill="#0f766e">LIVE APPROVAL QUEUE</text>
  <text x="64" y="230" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="900" fill="#101828">Review AI tool calls</text>
  <text x="64" y="290" font-family="Inter, Arial, sans-serif" font-size="28" fill="#475467">Approve side effects, block dangerous actions, and execute only approved commands.</text>

  <rect x="64" y="365" width="440" height="500" rx="12" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
  <text x="104" y="430" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#101828">Pending</text>
  <rect x="104" y="470" width="360" height="128" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="132" y="520" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#9a3412">refund.create</text>
  <text x="132" y="562" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475467">$250 duplicate charge</text>
  <rect x="104" y="626" width="172" height="62" rx="8" fill="#0f766e"/>
  <text x="142" y="665" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">Approve</text>
  <rect x="292" y="626" width="172" height="62" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="334" y="665" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#101828">Reject</text>

  <rect x="580" y="365" width="440" height="500" rx="12" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
  <text x="620" y="430" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#101828">ApprovedCommand</text>
  <rect x="620" y="470" width="360" height="286" rx="10" fill="#101828"/>
  <text x="650" y="525" font-family="Menlo, Consolas, monospace" font-size="22" fill="#e5e7eb">{</text>
  <text x="680" y="565" font-family="Menlo, Consolas, monospace" font-size="22" fill="#86efac">"type"</text>
  <text x="772" y="565" font-family="Menlo, Consolas, monospace" font-size="22" fill="#e5e7eb">: "refund.create",</text>
  <text x="680" y="605" font-family="Menlo, Consolas, monospace" font-size="22" fill="#86efac">"target"</text>
  <text x="785" y="605" font-family="Menlo, Consolas, monospace" font-size="22" fill="#e5e7eb">: "stripe",</text>
  <text x="680" y="645" font-family="Menlo, Consolas, monospace" font-size="22" fill="#86efac">"agentId"</text>
  <text x="798" y="645" font-family="Menlo, Consolas, monospace" font-size="22" fill="#e5e7eb">: "support"</text>
  <text x="650" y="685" font-family="Menlo, Consolas, monospace" font-size="22" fill="#e5e7eb">}</text>

  <rect x="1096" y="365" width="440" height="500" rx="12" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
  <text x="1136" y="430" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#101828">Blocked</text>
  <rect x="1136" y="470" width="360" height="128" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="1164" y="520" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#991b1b">user.delete</text>
  <text x="1164" y="562" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475467">Policy stopped execution</text>
  <rect x="1136" y="626" width="360" height="130" rx="10" fill="#ecfdf3" stroke="#bbf7d0"/>
  <text x="1164" y="684" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#166534">No raw tool call reached executor</text>
  <text x="1164" y="724" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475467">Only approved commands can run.</text>
  <text x="64" y="990" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#101828">Public demo</text>
  <text x="64" y="1045" font-family="Inter, Arial, sans-serif" font-size="26" fill="#475467">https://aeg-intent-gate-starter.pages.dev</text>
  <rect x="64" y="1115" width="1472" height="260" rx="12" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
  <text x="112" y="1192" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#101828">Executor contract</text>
  <text x="112" y="1255" font-family="Inter, Arial, sans-serif" font-size="24" fill="#475467">Real tools should accept only an ApprovedCommand. Raw model tool calls stay outside the executor.</text>
  <text x="112" y="1324" font-family="Menlo, Consolas, monospace" font-size="24" fill="#0f766e">approved command -> execute</text>
  <text x="112" y="1372" font-family="Menlo, Consolas, monospace" font-size="24" fill="#991b1b">blocked or pending -> do nothing</text>
</svg>
