<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-label="browser demo storyboard for aeg-intent-gate">
  <rect width="1600" height="1600" fill="#f4f8f7"/>
  <text x="72" y="92" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="900" fill="#101828">AI tool-call approval flow</text>
  <text x="72" y="140" font-family="Inter, Arial, sans-serif" font-size="24" fill="#475467">Starter app flow: proposed tool call, human approval, ApprovedCommand, blocked action.</text>

  <g transform="translate(120 230)">
    <rect width="620" height="500" rx="12" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="32" y="62" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#101828">1. Model proposes</text>
    <rect x="32" y="110" width="556" height="200" rx="10" fill="#101828"/>
    <text x="58" y="168" font-family="Menlo, Consolas, monospace" font-size="20" fill="#e5e7eb">tool_call:</text>
    <text x="58" y="210" font-family="Menlo, Consolas, monospace" font-size="20" fill="#fde68a">refund.create</text>
    <text x="58" y="252" font-family="Menlo, Consolas, monospace" font-size="20" fill="#93c5fd">amount: 250</text>
    <text x="32" y="388" font-family="Inter, Arial, sans-serif" font-size="24" fill="#475467">No executor sees the raw model output.</text>
  </g>

  <g transform="translate(860 230)">
    <rect width="620" height="500" rx="12" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="32" y="62" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#101828">2. Gate pauses</text>
    <rect x="32" y="110" width="556" height="200" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="58" y="172" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#9a3412">requires_approval</text>
    <text x="58" y="222" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475467">Human review needed</text>
    <rect x="32" y="360" width="170" height="62" rx="8" fill="#0f766e"/>
    <text x="58" y="353" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#ffffff">Approve</text>
    <rect x="232" y="360" width="170" height="62" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="288" y="397" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#101828">Reject</text>
  </g>

  <g transform="translate(120 840)">
    <rect width="620" height="500" rx="12" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="32" y="62" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#101828">3. Command created</text>
    <rect x="32" y="110" width="556" height="240" rx="10" fill="#ecfdf3" stroke="#bbf7d0"/>
    <text x="58" y="172" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#166534">ApprovedCommand</text>
    <text x="58" y="222" font-family="Menlo, Consolas, monospace" font-size="18" fill="#344054">type: refund.create</text>
    <text x="58" y="260" font-family="Menlo, Consolas, monospace" font-size="18" fill="#344054">target: stripe</text>
    <text x="32" y="420" font-family="Inter, Arial, sans-serif" font-size="24" fill="#475467">Executors accept this object only.</text>
  </g>

  <g transform="translate(860 840)">
    <rect width="620" height="500" rx="12" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="32" y="62" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#101828">4. Bad calls block</text>
    <rect x="32" y="110" width="556" height="200" rx="10" fill="#fef2f2" stroke="#fecaca"/>
    <text x="58" y="172" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#991b1b">blocked</text>
    <text x="58" y="222" font-family="Menlo, Consolas, monospace" font-size="19" fill="#475467">user.delete</text>
    <text x="32" y="388" font-family="Inter, Arial, sans-serif" font-size="24" fill="#475467">No command is created. Nothing runs.</text>
  </g>
</svg>
