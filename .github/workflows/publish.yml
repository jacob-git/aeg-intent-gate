name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: "@pallattu"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check published version
        id: published
        shell: bash
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")

          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$name@$version is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$name@$version is not published yet."
          fi

      - name: Publish
        if: steps.published.outputs.exists == 'false' && env.NODE_AUTH_TOKEN != ''
        run: npm publish --access public --provenance

      - name: Missing npm token
        if: steps.published.outputs.exists == 'false' && env.NODE_AUTH_TOKEN == ''
        run: |
          echo "::warning::NPM_TOKEN is not configured. Add it as a repository secret, then rerun this workflow."
